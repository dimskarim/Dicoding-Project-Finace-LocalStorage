<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Finance & Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="dashboard-container">
    
    <!-- menu samping (sidebar) -->
    <aside class="sidebar">
      <h2><span class="highlight">Finance</span>App</h2>
      <nav>
        <ul>
          <li class="active"><a href="#">Keuangan</a></li>
        </ul>
      </nav>
    </aside>

    <!-- konten sebelah kanan -->
    <main class="main-content">
      
      <!-- header atas sama kotak pencarian -->
      <header class="topbar">
        <h1>Dashboard Analitik</h1>
        <div class="search-bar">
          <input type="text" id="searchKeyword" placeholder="Cari transaksi berdasarkan judul...">
        </div>
      </header>

      <!-- kartu info saldo -->
      <section class="summary-cards">
        <div class="card balance-card">
          <h3>Total Saldo</h3>
          <h2 id="totalBalance">Rp0</h2>
        </div>
        <div class="card income-card">
          <h3>Pemasukan</h3>
          <h2 id="totalIncome">Rp0</h2>
        </div>
        <div class="card expense-card">
          <h3>Pengeluaran</h3>
          <h2 id="totalExpense">Rp0</h2>
        </div>
      </section>

      <!-- grid buat misahin kolom form & daftar transaksi -->
      <div class="content-grid">
        
        <!-- form buat input/edit data -->
        <section class="form-section">
          <h2>Tambah / Edit Transaksi</h2>
          <form id="transactionForm">
            <div class="form-group">
              <label for="title">Judul Transaksi</label>
              <input type="text" id="title" placeholder="Cth: Gaji Bulanan, Makan Siang" autocomplete="off">
            </div>
            
            <div class="form-group">
              <label for="amount">Nominal (Rp)</label>
              <input type="number" id="amount" placeholder="Cth: 5000000" min="1">
            </div>
            
            <div class="form-group">
              <label for="date">Tanggal</label>
              <input type="date" id="date">
            </div>
            
            <div class="form-group">
              <label for="type">Tipe</label>
              <select id="type">
                <option value="income">Pemasukan</option>
                <option value="expense">Pengeluaran</option>
              </select>
            </div>
            
            <button type="submit" class="btn-submit">Simpan Transaksi</button>
            <button type="button" class="btn-cancel" id="btnCancelEdit" style="display: none;">Batal Edit</button>
          </form>
        </section>

        <!-- tempat list transaksinya nanti dimunculin -->
        <section class="list-section">
          <h2>Daftar Transaksi</h2>
          <div id="transactionList" class="transaction-list">
            <!-- transaksinya kerender disini lewat javascript -->
          </div>
        </section>

      </div>
    </main>
  </div>
  
  <!-- popup konfirmasi bikinan sendiri -->
  <div id="customModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <h3 id="modalTitle">Konfirmasi</h3>
      <p id="modalMessage">Pesan konfirmasi di sini.</p>
      <div class="modal-actions">
        <button id="modalBtnCancel" class="btn-cancel">Batal</button>
        <button id="modalBtnConfirm" class="btn-submit">Ya</button>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
